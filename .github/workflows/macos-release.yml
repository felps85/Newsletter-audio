name: macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-sign-notarize:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      APP_NAME: ${{ vars.APP_NAME || 'NewsletterAudio' }}
      SCHEME: ${{ vars.SCHEME || 'NewsletterAudio' }}
      CONFIGURATION: Release
      PROJECT_PATH: ${{ vars.PROJECT_PATH }}
      WORKSPACE_PATH: ${{ vars.WORKSPACE_PATH }}
      VOLNAME: ${{ vars.VOLNAME || 'Newsletter Audio' }}
      SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12" | base64 --decode > signing-cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import signing-cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build, notarize, and package DMG
        run: ./scripts/release-macos.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
